<svg width="420" height="560" viewBox="0 0 420 560" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bottleGrad" x1="210" y1="0" x2="210" y2="560" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1a1520"/>
      <stop offset="50%" stop-color="#0f0c12"/>
      <stop offset="100%" stop-color="#050405"/>
    </linearGradient>
    <linearGradient id="goldCap" x1="210" y1="40" x2="210" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8d5a3"/>
      <stop offset="50%" stop-color="#c9a227"/>
      <stop offset="100%" stop-color="#8b7355"/>
    </linearGradient>
    <linearGradient id="labelGrad" x1="210" y1="200" x2="210" y2="380" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a080c"/>
      <stop offset="100%" stop-color="#120f14"/>
    </linearGradient>
  </defs>
  <!-- Bottle body -->
  <path d="M120 160 L120 520 Q120 560 160 560 L260 560 Q300 560 300 520 L300 160 Q300 120 260 120 L160 120 Q120 120 120 160 Z" fill="url(#bottleGrad)" stroke="#1a1520" stroke-width="2"/>
  <!-- Neck -->
  <rect x="170" y="60" width="80" height="60" rx="4" fill="#0f0c12" stroke="#1a1520" stroke-width="2"/>
  <!-- Cap -->
  <rect x="165" y="20" width="90" height="50" rx="3" fill="url(#goldCap)"/>
  <!-- Label -->
  <rect x="140" y="200" width="140" height="180" rx="8" fill="url(#labelGrad)" stroke="#c9a227" stroke-width="1" stroke-opacity="0.3"/>
  <!-- Label text -->
  <text x="210" y="280" text-anchor="middle" font-family="serif" font-size="24" fill="#c9a227" font-style="italic">Oil</text>
  <text x="210" y="310" text-anchor="middle" font-family="serif" font-size="24" fill="#c9a227" font-style="italic">Amor</text>
  <line x1="180" y1="330" x2="240" y2="330" stroke="#c9a227" stroke-width="1" stroke-opacity="0.4"/>
  <!-- Glow accent -->
  <ellipse cx="210" cy="460" rx="60" ry="20" fill="#c9a227" fill-opacity="0.08"/>
</svg>
